<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Estudante - EEEP Manoel Mano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="user-info">
            <div>
                <span class="user-name">Usuário Logado</span>
                <span class="user-role">Secretária</span>
            </div>
        </div>
        <nav class="menu">
            <a href="index.html">Início</a>
            <a href="cadastro.html" class="active">Cadastro</a>
            <a href="ranking.php">Ranking</a>
        </nav>
    </header>

    <main class="registration-container">
        <h1>Cadastro de estudante</h1>
        
        <form class="student-form" action="salvar_cadastro.php" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="media_final" id="media_final" value="0.00">
            <input type="hidden" name="categoria_ranking" id="categoria_ranking" value="">

            <div class="form-row">
                <label>Nome completo do aluno</label>
                <input type="text" name="nome_aluno" placeholder="Nome completo" required>
            </div>

            <div class="form-row-group">
                <div class="field">
                    <label>Bairro</label>
                    <input type="text" name="bairro" id="bairro" placeholder="Ex: Venâncios" required>
                </div>
                <div class="field">
                    <label>Deseja concorrer à Cota Local?</label>
                    <select name="optou_cota_local" id="optou_cota_local">
                        <option value="nao">Não</option>
                        <option value="sim">Sim (Bairro dos Venâncios)</option>
                    </select>
                </div>
            </div>

            <div class="form-row-group">
                <div class="field">
                    <label>Procedência Escolar</label>
                    <select name="procedencia" id="procedencia">
                        <option value="publica">Escola Pública</option>
                        <option value="privada">Escola Privada</option>
                    </select>
                </div>
                <div class="field">
                    <label>Cota PCD?</label>
                    <select name="pcd" id="pcd">
                        <option value="nao">Não</option>
                        <option value="sim">Sim</option>
                    </select>
                </div>
            </div>

            <div class="form-row" style="background: #e8f5e9; padding: 15px; border: 1px dashed #28a745; border-radius: 8px;">
                <label style="color: #1b8a00; font-weight: bold;">📄 Importar Boletim PDF (Opcional)</label>
                <input type="file" name="boletim_pdf" accept="application/pdf">
            </div>

            <div class="grades-section">
                <h3>Notas (Português e Matemática)</h3>
                <table>
                    <tr>
                        <th>Disciplina</th>
                        <th>6º Ano</th><th>7º Ano</th><th>8º Ano</th><th>9º Ano</th>
                    </tr>
                    <tr>
                        <td>Português</td>
                        <td><input type="number" step="0.01" class="input-nota" name="lp6"></td>
                        <td><input type="number" step="0.01" class="input-nota" name="lp7"></td>
                        <td><input type="number" step="0.01" class="input-nota" name="lp8"></td>
                        <td><input type="number" step="0.01" class="input-nota" name="lp9"></td>
                    </tr>
                    <tr>
                        <td>Matemática</td>
                        <td><input type="number" step="0.01" class="input-nota" name="mat6"></td>
                        <td><input type="number" step="0.01" class="input-nota" name="mat7"></td>
                        <td><input type="number" step="0.01" class="input-nota" name="mat8"></td>
                        <td><input type="number" step="0.01" class="input-nota" name="mat9"></td>
                    </tr>
                </table>
            </div>

            <button type="submit" class="btn-save" style="margin-top: 20px;">SALVAR ALUNO</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
