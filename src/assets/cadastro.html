<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Estudante - EEEP Manoel Mano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="user-info">
            <div>
                <span class="user-name" id="nome-perfil-nav">Usuário Logado</span>
                <span class="user-role">Secretária</span>
            </div>
            <div class="nav-icons">
                <span>⚙️</span> <span>🔔</span> <span style="cursor:pointer" id="logout-btn" onclick="window.location.href='index.html'">🚪</span>
            </div>
        </div>
        <nav class="menu">
            <a href="#">Início</a>
            <a href="#" class="active">Cadastro</a>
            <a href="#">Dashboard</a>
            <a href="#">Ranking</a>
        </nav>
    </header>

    <main class="registration-container">
        <h1>Cadastro de estudante</h1>
        
        <div class="registration-content">
            <form class="student-form" action="#" method="POST">
                <div class="form-row">
                    <label>Nome completo do aluno</label>
                    <input type="text" name="nome_aluno" placeholder="Nome completo" required>
                </div>

                <div class="form-row">
                    <label>Data de nascimento</label>
                    <input type="text" id="data-nascimento" name="data_nascimento" placeholder="DD/MM/AAAA" maxlength="10">
                </div>

                <div class="form-row-group">
                    <div class="field">
                        <label>Sexo</label>
                        <select name="sexo"><option>Masculino</option><option>Feminino</option></select>
                    </div>
                  <div class="form-row-group">
                <div class="field">
                    <label>Procedência Escolar</label>
                    <select name="procedencia">
                        <option value="publica">Escola Pública</option>
                        <option value="privada">Escola Privada</option>
                    </select>
                </div>

                <div class="field">
                    <label>Cota Local?</label>
                    <select name="cota_local" id="cota_local_select">
                        <option value="nao">Não</option>
                        <option value="sim">Sim (Cota de Local)</option>
                    </select>
                    <small style="color: #666; display: block; margin-top: 5px; font-size: 11px;">
                        *Apenas para moradores do <strong>Bairro dos Venâncios</strong>.
                    </small>
                </div>

                <div class="field">
                    <label>PCD (Deficiente)</label>
                    <select name="pcd">
                        <option value="nao">Não</option>
                        <option value="sim">Sim</option>
                    </select>
                </div>
            </div>
                </div>
                <div class="form-row">
                    <label>CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14">
                </div>

                <div class="form-row">
                    <label>CEP</label>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9">
                </div>
                <div class="form-row">
                    <label>Bairro</label>
                    <input type="text" id="bairro" name="bairro" placeholder="Ex: Bairro dos Venâncios" required>
                </div>

                <div class="form-row-group">
                   
                    <div class="field">
                        <label>Curso</label>
                        <select name="curso">
                            <option>Enfermagem</option>
                            <option>Informática</option>
                            <option>Administração</option>
                            <option>Desenvolvimento de Sistemas</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <label>Nome do responsável</label>
                    <input type="text" name="nome_responsavel" placeholder="Nome completo">
                </div>

                <div class="grades-section">
                    <div class="container-notas" style="margin-top: 30px;">
    <h3 style="color: #2e7d32; border-bottom: 2px solid #4caf50; padding-bottom: 10px;">Desempenho Acadêmico</h3>
    
    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff;">
            <thead>
                <tr style="background-color: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                    <th style="padding: 12px; text-align: left;">Matéria</th>
                    <th style="padding: 12px; text-align: center;">6º Ano</th>
                    <th style="padding: 12px; text-align: center;">7º Ano</th>
                    <th style="padding: 12px; text-align: center;">8º Ano</th>
                    <th style="padding: 12px; text-align: center;">9º Ano</th>
                </tr>
            </thead>
            <tbody>
    <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px; font-weight: bold;">Português</td>
        <td><input type="number" name="port_6" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="port_7" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="port_8" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="port_9" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
    </tr>
    <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px; font-weight: bold;">Matemática</td>
        <td><input type="number" name="mat_6" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="mat_7" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="mat_8" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="mat_9" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
    </tr>
    <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px; font-weight: bold;">Ciências</td>
        <td><input type="number" name="cie_6" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="cie_7" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="cie_8" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="cie_9" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
    </tr>
    <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px; font-weight: bold;">História</td>
        <td><input type="number" name="his_6" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="his_7" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="his_8" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="his_9" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
    </tr>
    <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px; font-weight: bold;">Geografia</td>
        <td><input type="number" name="geo_6" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="geo_7" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="geo_8" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="geo_9" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
    </tr>
    <tr style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px; font-weight: bold;">Inglês</td>
        <td><input type="number" name="ing_6" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="ing_7" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="ing_8" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
        <td><input type="number" name="ing_9" step="0.1" min="0" max="10" class="input-nota" placeholder="0.0"></td>
    </tr>
</tbody>
        </table>
    </div>
</div>

                </div>

                <button type="submit" class="btn-save">➕ Cadastrar novo aluno</button>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
