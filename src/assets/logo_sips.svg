<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">
  <!-- Green background square -->
  <rect width="100" height="100" fill="#178201" rx="10"/>
  <!-- Outer circle -->
  <circle cx="50" cy="48" r="36" fill="none" stroke="white" stroke-width="3"/>
  <!-- Person head -->
  <circle cx="50" cy="34" r="9" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Person shoulders / body -->
  <path d="M32 62 Q32 50 50 50 Q68 50 68 62" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Graduation cap top -->
  <polygon points="50,20 36,28 50,36 64,28" fill="white"/>
  <!-- Graduation cap brim -->
  <rect x="44" y="28" width="12" height="3" fill="white" rx="1"/>
  <!-- Plus sign (bottom right of circle) -->
  <line x1="61" y1="70" x2="61" y2="82" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="55" y1="76" x2="67" y2="76" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
