<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EEEP Manoel Mano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="main-container">
        <section class="welcome-section">
            <div class="logo">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJgsXhRW5qdtpDbZWZmmPzg9njNJXOGcYLpQ&s" alt="Logo">
            </div>
            <div class="welcome-text">
                <h1>Olá, Seja bem-vindo !</h1>
                <p>Faça o seu login para acessar a sua conta</p>
            </div>
        </section>

        <section class="login-section">
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <span class="icon">✉️</span>
                        <input type="email" id="email" placeholder="Digite o seu e-mail">
                    </div>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <span class="icon">🔑</span>
                        <input type="password" id="senha" placeholder="Digite a sua senha">
                    </div>
                </div>

                <a href="">
                        <button type="submit" class="btn-entrar">Entrar</button>
                    <div class="signup-link">
                        <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
                    </div>  
                </a>
            </form>

            <footer class="footer-links">
                <footer class="footer-links">
                    <a href="privacidade.html">Política de privacidade</a> | 
                    <a href="termos.html">Termos de serviço</a>
            </footer>
            </footer>
        </section>
    </main>

    <script src="script.js"></script>

</body>
</html>
