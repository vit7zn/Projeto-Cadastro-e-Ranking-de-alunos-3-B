<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - EEEP Manoel Mano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="main-container">
        <section class="welcome-section">
            <div class="logo">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJgsXhRW5qdtpDbZWZmmPzg9njNJXOGcYLpQ&s" alt="Logo EEEP Manoel Mano">
            </div>
            <div class="welcome-text">
                <h1 id="welcome-title">Olá, seja bem-vindo!</h1>
                <p id="welcome-subtitle">Faça login para acessar o sistema de seleção</p>
            </div>
        </section>

        <section class="login-section">

            <!-- FORMULÁRIO LOGIN -->
            <form class="login-form" id="loginForm" action="login.php" method="POST">
                <div class="input-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="Digite o seu e-mail" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="senha" name="senha" placeholder="Digite a sua senha" required>
                    </div>
                </div>
                <button type="submit" class="btn-entrar">Entrar</button>
                <p class="toggle-form-text">Não tem uma conta? <a href="#" id="linkCadastro">Cadastre-se</a></p>
            </form>

            <!-- FORMULÁRIO CADASTRO -->
            <form class="login-form" id="registerForm" action="cadastrar.php" method="POST" style="display:none;">
                <div class="input-group">
                    <label>Nome</label>
                    <div class="input-wrapper">
                        <input type="text" id="nome_cadastro" name="nome" placeholder="Nome completo" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <input type="email" id="email_cadastro" name="email" placeholder="Digite um e-mail válido" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="senha_cadastro" name="senha" placeholder="Crie uma senha" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Confirmar Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirma_senha" name="confirma_senha" placeholder="Repita a senha" required>
                    </div>
                </div>
                <button type="submit" class="btn-entrar">Criar Conta</button>
                <p class="toggle-form-text">Já possui uma conta? <a href="#" id="linkLogin">Faça login</a></p>
            </form>

            <footer class="footer-links">
                <a href="privacidade.html">Política de privacidade</a> | <a href="termos.html">Termos de serviço</a>
            </footer>
        </section>
    </main>

    <script>
        const loginForm    = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const title        = document.getElementById('welcome-title');
        const subtitle     = document.getElementById('welcome-subtitle');

        document.getElementById('linkCadastro').addEventListener('click', e => {
            e.preventDefault();
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            title.textContent    = 'Criar uma conta';
            subtitle.textContent = 'Preencha os dados para se cadastrar';
        });

        document.getElementById('linkLogin').addEventListener('click', e => {
            e.preventDefault();
            registerForm.style.display = 'none';
            loginForm.style.display    = 'block';
            title.textContent    = 'Olá, seja bem-vindo!';
            subtitle.textContent = 'Faça login para acessar o sistema de seleção';
        });
    </script>
</body>
</html>
