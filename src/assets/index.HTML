<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso — EEEP Manoel Mano</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="main-container">

  <!-- ── Lado esquerdo ── -->
  <section class="welcome-section">
    <div class="divider-line"></div>

    <div class="logo">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJgsXhRW5qdtpDbZWZmmPzg9njNJXOGcYLpQ&s" alt="Logo EEEP Manoel Mano">
    </div>

    <div class="welcome-text">
      <h1 id="welcome-title"><em>Sistema</em><br>de Seleção<br>2026</h1>
      <p id="welcome-subtitle">Plataforma oficial de inscrição e acompanhamento do processo seletivo da EEEP Manoel Mano.</p>
    </div>

    <div class="login-year-badge">2026</div>
  </section>

  <!-- ── Lado direito ── -->
  <section class="login-section">

    <!-- LOGIN -->
    <form class="login-form" id="loginForm" action="login.php" method="POST">
      <span class="form-eyebrow">EEEP Manoel Mano</span>
      <h2 class="form-title" id="form-title">Entrar na conta</h2>

      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-entrar">Entrar</button>
      <p class="toggle-form-text">Não tem uma conta? <a href="#" id="linkCadastro">Cadastre-se</a></p>
    </form>

    <!-- CADASTRO -->
    <form class="login-form" id="registerForm" action="cadastrar.php" method="POST" style="display:none;">
      <span class="form-eyebrow">EEEP Manoel Mano</span>
      <h2 class="form-title">Criar conta</h2>

      <div class="input-group">
        <label for="nome_cadastro">Nome completo</label>
        <input type="text" id="nome_cadastro" name="nome" placeholder="Seu nome completo" required>
      </div>
      <div class="input-group">
        <label for="email_cadastro">E-mail</label>
        <input type="email" id="email_cadastro" name="email" placeholder="seu@email.com" required>
      </div>
      <div class="input-group">
        <label for="senha_cadastro">Senha</label>
        <input type="password" id="senha_cadastro" name="senha" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="input-group">
        <label for="confirma_senha">Confirmar senha</label>
        <input type="password" id="confirma_senha" name="confirma_senha" placeholder="Repita a senha" required>
      </div>

      <button type="submit" class="btn-entrar">Criar conta</button>
      <p class="toggle-form-text">Já tem uma conta? <a href="#" id="linkLogin">Entrar</a></p>
    </form>

    <footer class="footer-links">
      <a href="privacidade.html">Privacidade</a> &middot; <a href="termos.html">Termos</a>
    </footer>
  </section>
</main>

<script>
  // ── toggle forms ──
  document.getElementById('linkCadastro').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('loginForm').style.display    = 'none';
    document.getElementById('registerForm').style.display = 'block';
  });
  document.getElementById('linkLogin').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').style.display    = 'block';
  });

  // ── erros via URL ──
  const erros = {
    campos_vazios:       'Preencha todos os campos.',
    senha_incorreta:     'Senha incorreta. Tente novamente.',
    email_nao_encontrado:'E-mail não encontrado.'
  };
  const e = new URLSearchParams(location.search).get('erro');
  if (e && erros[e]) {
    const t = document.createElement('div');
    t.style.cssText = `
      position:fixed;top:18px;left:50%;transform:translateX(-50%);
      background:#0c0f0c;color:#fff;padding:10px 20px;
      border-radius:5px;font-size:.8rem;font-weight:600;
      border-left:3px solid #dc2626;z-index:9999;
      box-shadow:0 8px 22px rgba(0,0,0,.28);
      font-family:'Instrument Sans',sans-serif;white-space:nowrap;
      animation:slideUp .3s ease;
    `;
    t.textContent = erros[e];
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4500);
  }
</script>
</body>
</html>
